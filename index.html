<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <title>Browser Game Arcade</title>
  <link rel="stylesheet" href="menu.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Browser Game Arcade</p>
      <h1>iPhoneで遊べる<br>ミニゲーム集</h1>
      <p class="lead">
        GitHub Pages でそのまま開ける、軽量なブラウザゲーム置き場です。
        まずは五目並べを追加しています。
      </p>
    </section>

    <section class="menu" aria-label="ゲームメニュー">
      <a class="game-card" href="./gomoku/index.html">
        <span class="game-badge">Now Playing</span>
        <h2>五目並べ</h2>
        <p>15x15 盤面で遊べる対戦ゲーム。2人対戦と CPU 対戦に対応。</p>
        <span class="game-link">ゲームを開く</span>
      </a>
    </section>
