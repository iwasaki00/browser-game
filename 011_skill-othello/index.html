<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>スキルオセロ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <nav class="topbar" aria-label="サイトナビゲーション">
      <a class="back-link" href="../index.html">← ゲーム一覧へ戻る</a>
    </nav>

    <header class="header">
      <p class="eyebrow">Browser Game</p>
      <h1>スキルオセロ</h1>
      <div class="mode-row" aria-label="ゲームモード">
        <label class="mode-picker">
          <span>対戦モード</span>
          <select id="modeSelect">
            <option value="cpu">CPU対戦</option>
            <option value="online">オンライン対戦</option>
          </select>
        </label>
        <button id="restartButton" type="button">リスタート</button>
      </div>
    </header>

    <section id="onlinePanel" class="online-panel" hidden>
      <div class="online-actions">
        <button id="createRoomButton" type="button">部屋を作る</button>
        <button id="joinRoomButton" type="button">部屋に入る</button>
        <button id="leaveRoomButton" type="button">退出</button>
      </div>
      <label class="room-field">
        <span>部屋ID</span>
        <input id="roomIdInput" type="text" inputmode="numeric" maxlength="6" placeholder="123456" autocomplete="off">
      </label>
      <div class="online-status-grid" aria-label="オンライン状況">
        <div>
          <span class="label">接続</span>
          <strong id="onlineConnectionText">未接続</strong>
        </div>
        <div>
          <span class="label">参加</span>
          <strong id="onlinePlayersText">0/2</strong>
        </div>
        <div>
          <span class="label">自分</span>
          <strong id="onlineColorText">-</strong>
        </div>
        <div>
          <span class="label">手番</span>
          <strong id="onlineTurnText">-</strong>
        </div>
      </div>
      <p id="onlineHint" class="online-hint">部屋を作るか、6桁の部屋IDを入力して参加してください。</p>
      <p id="roomInfo" class="room-info"></p>
      <section class="chat-panel" aria-label="チャット">
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-row">
          <input id="chatInput" type="text" maxlength="80" placeholder="メッセージ" autocomplete="off" disabled>
          <button id="sendChatButton" type="button" disabled>送信</button>
        </div>
      </section>
    </section>

    <section class="status-panel" aria-label="ゲーム状況">
      <div>
        <span class="label">状況</span>
        <strong id="messageText">置ける場所を選んでください</strong>
      </div>
    </section>

    <section class="board-wrap" aria-label="オセロ盤">
      <div id="board" class="board" role="grid" aria-label="8×8のオセロ盤"></div>
    </section>

    <section class="skill-panel" aria-label="スキル石選択">
      <button class="skill-button active" type="button" data-skill="normal">
        <span class="skill-icon normal-icon"></span>
        <span>通常石(∞)</span>
      </button>
      <button class="skill-button" type="button" data-skill="bomb">
        <span class="skill-icon bomb-icon"></span>
        <span>爆弾石(<b data-skill-count="bomb">2</b>)</span>
      </button>
      <button class="skill-button" type="button" data-skill="wall">
        <span class="skill-icon wall-icon"></span>
        <span>壁石(<b data-skill-count="wall">2</b>)</span>
      </button>
      <button class="skill-button" type="button" data-skill="convert">
        <span class="skill-icon convert-icon"></span>
        <span>変換石(<b data-skill-count="convert">1</b>)</span>
      </button>
      <button class="skill-button" type="button" data-skill="timer">
        <span class="skill-icon timer-icon">◷</span>
        <span>時限石(<b data-skill-count="timer">2</b>)</span>
      </button>
      <button class="skill-button" type="button" data-skill="heavy">
        <span class="skill-icon heavy-icon"></span>
        <span>重石(<b data-skill-count="heavy">2</b>)</span>
      </button>
      <button class="skill-button" type="button" data-skill="trap">
        <span class="skill-icon trap-icon"></span>
        <span>トラップ石(<b data-skill-count="trap">2</b>)</span>
      </button>
    </section>

    <button id="skillHelpButton" class="skill-help-button" type="button">スキル説明</button>

    <section id="summaryPanel" class="summary-panel" aria-label="戦績サマリー" hidden>
      <h2>戦績サマリー</h2>
      <div id="summaryContent" class="summary-content"></div>
    </section>
  </main>

  <div id="skillModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="skillModalTitle" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <section class="modal-content">
      <header class="modal-header">
        <h2 id="skillModalTitle">スキル説明</h2>
        <button id="closeSkillModalButton" class="modal-close" type="button" aria-label="閉じる">×</button>
      </header>
      <div class="skill-descriptions">
        <article><h3>通常石</h3><p>オセロの基本となる石</p></article>
        <article><h3>爆弾石</h3><p>周囲8マスの敵石を反転</p></article>
        <article><h3>壁石</h3><p>反転されない特殊石</p></article>
        <article><h3>変換石</h3><p>8方向最初の敵石を変換</p></article>
        <article><h3>時限石</h3><p>3ターン後に消滅する石</p></article>
        <article><h3>重石</h3><p>2回攻撃されるまで反転しない</p></article>
        <article><h3>トラップ石</h3><p>反転された時に周囲を巻き込む</p></article>
      </div>
    </section>
  </div>

  <script type="module" src="script.js?v=skill-othello-20260620-new-skills"></script>
</body>
</html>
