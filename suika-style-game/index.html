<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>スイカ・ドロップ</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <a class="back-link" href="../index.html" aria-label="ゲーム一覧へ戻る">←</a>
      <div class="title-block">
        <p>Suika Style Game</p>
        <h1>スイカ・ドロップ</h1>
      </div>
      <button id="pauseButton" class="icon-button" type="button" aria-label="一時停止">Ⅱ</button>
    </header>

    <section class="score-grid" aria-label="スコア">
      <div class="score-card">
        <span>Score</span>
        <strong id="scoreText">0</strong>
      </div>
      <div class="score-card">
        <span>Best</span>
        <strong id="bestScoreText">0</strong>
      </div>
      <div class="next-card">
        <span>Next</span>
        <canvas id="nextCanvas" width="84" height="84" aria-label="次のフルーツ"></canvas>
      </div>
    </section>

    <section class="play-area" aria-label="ゲーム盤面">
      <canvas id="gameCanvas" width="420" height="680"></canvas>
      <div class="drop-guide" id="dropGuide" aria-hidden="true"></div>
      <div class="danger-label">GAME OVER LINE</div>
    </section>

    <section class="controls" aria-label="操作">
      <button id="shakeButton" class="primary-button" type="button">揺らす</button>
      <button id="restartButton" class="secondary-button" type="button">リスタート</button>
    </section>
  </main>

  <section id="gameOverOverlay" class="overlay" aria-label="ゲームオーバー">
    <div class="dialog">
      <p>Game Over</p>
      <h2>ゲームオーバー</h2>
      <div class="result-line">
        <span>Score</span>
        <strong id="finalScoreText">0</strong>
      </div>
      <div class="result-line">
        <span>Best</span>
        <strong id="finalBestText">0</strong>
      </div>
      <button id="overlayRestartButton" class="primary-button" type="button">もう一度遊ぶ</button>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
