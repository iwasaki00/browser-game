<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>AI遺産 - Last Memory Protocol -</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app" id="app">
    <section class="title-screen" id="titleScreen" aria-label="タイトル画面">
      <div class="title-inner">
        <p class="title-kicker">Sound Novel MVP</p>
        <h1>AI遺産</h1>
        <p class="title-sub">Last Memory Protocol</p>
        <p class="title-copy">死者を再現するAIが告げた。「どうして今回も失敗したの？」</p>
        <div class="title-actions">
          <button class="primary-button" id="startButton" type="button">はじめから</button>
          <button class="ghost-button" id="loadButton" type="button">ロード</button>
          <button class="ghost-button locked hidden" id="truthButton" type="button">Last Memory Protocol</button>
        </div>
        <div class="ending-records" id="endingRecords"></div>
      </div>
    </section>

    <section class="game-screen hidden" id="gameScreen" aria-label="ゲーム画面">
      <div class="background" id="background"></div>
      <div class="noise-layer" id="noiseLayer"></div>
      <div class="character-area" id="characterArea" aria-hidden="true">
        <div class="character-shadow"></div>
        <div class="character-silhouette" id="characterSilhouette"></div>
      </div>

      <button class="menu-button" id="menuButton" type="button" aria-label="メニュー">MENU</button>

      <section class="message-area" id="messageArea" aria-label="本文">
        <div class="name-box" id="nameBox">SYSTEM</div>
        <p class="message-text" id="messageText"></p>
        <div class="tap-indicator" id="tapIndicator">▼</div>
      </section>

      <div class="choices" id="choices"></div>
    </section>

    <section class="ending-screen hidden" id="endingScreen" aria-label="エンディング">
      <div class="modal-card">
        <p class="modal-kicker">Ending</p>
        <h2 id="endingTitle">END</h2>
        <p id="endingText"></p>
        <div class="modal-actions">
          <button class="primary-button" id="endingTitleButton" type="button">タイトルへ戻る</button>
          <button class="ghost-button" id="endingRestartButton" type="button">最初から読む</button>
        </div>
      </div>
    </section>

    <section class="overlay hidden" id="menuOverlay" aria-label="メニュー">
      <div class="modal-card menu-card">
        <p class="modal-kicker">Menu</p>
        <h2>操作</h2>
        <div class="menu-grid">
          <button type="button" id="saveButton">セーブ</button>
          <button type="button" id="menuLoadButton">ロード</button>
          <button type="button" id="autoButton">オート</button>
          <button type="button" id="skipButton">スキップ</button>
          <button type="button" id="backlogButton">バックログ</button>
          <button type="button" id="backTitleButton">タイトルへ戻る</button>
        </div>
        <label class="volume-row">
          <span>音量</span>
          <input id="volumeInput" type="range" min="0" max="100" value="60">
        </label>
        <button class="close-button" id="closeMenuButton" type="button">閉じる</button>
      </div>
    </section>

    <section class="overlay hidden" id="backlogOverlay" aria-label="バックログ">
      <div class="modal-card backlog-card">
        <p class="modal-kicker">Backlog</p>
        <h2>ログ</h2>
        <div class="backlog-list" id="backlogList"></div>
        <button class="close-button" id="closeBacklogButton" type="button">閉じる</button>
      </div>
    </section>

    <div class="toast hidden" id="toast" role="status"></div>
  </main>

  <script src="scenario.js"></script>
  <script src="save.js"></script>
  <script src="main.js"></script>
</body>
</html>
