<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#10111a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <title>効果音サンプラー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <a class="back-link" href="../">← ゲームメニュー</a>
      <p class="eyebrow">SOUND TOOL</p>
      <h1>効果音サンプラー</h1>
      <p class="description">パッドをタップして、好きなタイミングで効果音を鳴らそう。</p>
    </header>
    <section id="startPanel" class="start-panel" aria-labelledby="startTitle">
      <div><h2 id="startTitle">音を鳴らす準備</h2><p>iPhoneでは、最初にボタンを押してオーディオを有効にしてください。</p></div>
      <button id="startButton" class="primary-button" type="button">サンプラー開始</button>
    </section>
    <section class="toolbar" aria-label="サンプラー操作">
      <label class="volume-control" for="volume"><span>音量</span><input id="volume" type="range" min="0" max="1" step="0.01" value="0.8"><output id="volumeValue" for="volume">80%</output></label>
      <div class="actions">
        <button id="stopButton" class="tool-button stop-button" type="button" disabled>■ 全体停止</button>
        <button id="addButton" class="tool-button add-button" type="button">＋ 効果音を追加</button>
        <input id="fileInput" class="visually-hidden" type="file" accept="audio/*,.mp3,.wav,.m4a" multiple>
      </div>
    </section>
    <div id="status" class="status" role="status" aria-live="polite">サンプラーを開始してください</div>
    <section aria-labelledby="padsTitle">
      <div class="section-heading"><h2 id="padsTitle">サウンドパッド</h2><span id="soundCount">0 sounds</span></div>
      <div id="padGrid" class="pad-grid"></div>
    </section>
  </main>
  <script src="main.js"></script>
</body>
</html>
