<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>潜入コード: ゼロ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <canvas id="gameCanvas" width="480" height="720" aria-label="潜入コード: ゼロ"></canvas>

    <section id="hud" class="hud" aria-label="ゲーム情報">
      <div class="hud-main">
        <span id="stageLabel">Stage 1</span>
        <strong id="objectiveLabel">目的: 潜入開始</strong>
      </div>
      <div id="hudSub" class="hud-sub">
        <span id="itemLabel" class="items">CARD:- DATA:-</span>
        <span class="alert-wrap" aria-label="警戒ゲージ">
          <span>警戒</span>
          <meter id="alertMeter" min="0" max="100" value="0"></meter>
        </span>
      </div>
    </section>

    <button id="debugButton" class="debug-button" type="button" aria-label="デバッグ表示">D</button>

    <section class="touch-layer" aria-label="タッチ操作">
      <div id="stick" class="stick" aria-label="移動スティック">
        <div id="stickKnob" class="stick-knob"></div>
      </div>
      <div class="actions">
        <button id="crouchButton" class="round-button secondary" type="button">屈</button>
        <button id="actionButton" class="round-button primary" type="button">調</button>
      </div>
    </section>

    <section id="overlay" class="overlay">
      <div class="panel">
        <p class="eyebrow">Top-Down Stealth</p>
        <h1>潜入コード: ゼロ</h1>
        <p id="overlayText">敵の視界を避け、端末やカードキーを使って重要データを回収し、脱出口へ向かえ。</p>
        <button id="startButton" type="button">START</button>
        <a href="../index.html">メニューへ</a>
      </div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
